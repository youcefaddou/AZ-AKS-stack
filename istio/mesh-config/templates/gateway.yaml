{{- if .Values.gateway.enabled }}
# Rendu uniquement quand l'ingress actif est Istio (cf. helmfile.yaml,
# environments: la valeur "ingress" pilote gateway.enabled). Traefik et la
# Gateway Istio se disputeraient sinon le même NodePort 30080.
#
# ConfigMap de surcharge (strategic merge patch) du Service que la Gateway
# ci-dessous fait auto-provisionner par istiod. Par défaut ce Service serait
# type=LoadBalancer, qui resterait indéfiniment en <pending> sur kind (pas
# de cloud-controller-manager, cf. décision prise sur ce repo de rester en
# NodePort plutôt que d'installer cloud-provider-kind). On force donc les
# mêmes NodePort fixes qu'utilisait Traefik, pour que
# http://xxx.localhost continue de fonctionner sur le port 80 de la machine
# hôte via le mapping défini dans ../../kind-config.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: istio-gateway-service-options
  namespace: istio-system
data:
  service: |
    spec:
      type: LoadBalancer
      ports:
        - name: http
          port: 80
          targetPort: 8080
  deployment: |
    spec:
      template:
        spec:
          containers:
            - name: istio-proxy
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 128Mi
---
# Remplace la Gateway Traefik : Istio implémente lui aussi la Gateway API
# (gatewayClassName: istio, enregistrée automatiquement par istiod). Grâce à
# spec.infrastructure.parametersRef, istiod provisionne automatiquement le
# Deployment + Service Envoy correspondant : pas besoin d'installer le
# chart Helm "istio/gateway" séparément, cette fonctionnalité fait partie
# du control plane depuis Istio 1.16+.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: istio-gateway
  namespace: istio-system
spec:
  gatewayClassName: istio
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: istio-gateway-service-options
  listeners:
    - name: web
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
