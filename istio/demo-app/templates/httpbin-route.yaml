# Expose httpbin sur http://httpbin.localhost, via quelle que soit la
# Gateway API active (gatewayName/gatewayNamespace surchargés par
# helmfile.yaml selon la valeur d'environnement "ingress" : istio ou
# traefik). Sert surtout à valider que l'ingress route bien du trafic
# externe vers un service du mesh (par opposition aux traces est-ouest
# load-generator -> httpbin, qui elles ne passent jamais par la Gateway).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin
  namespace: demo
spec:
  parentRefs:
    - name: {{ .Values.gatewayName }}
      namespace: {{ .Values.gatewayNamespace }}
      sectionName: web
  hostnames:
    - httpbin.localhost
  rules:
    - backendRefs:
        - name: httpbin
          port: 8080
