apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayName }}
      namespace: {{ .Values.gatewayNamespace }}
      sectionName: web
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayName }}
      namespace: {{ .Values.gatewayNamespace }}
      sectionName: web
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /metrics
      backendRefs:
        - name: backend
          port: 80
